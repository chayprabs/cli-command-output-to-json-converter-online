name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx next typegen
      - run: npx tsc --noEmit
      - run: npm run lint
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip jc==1.25.6
      - run: npm run check:parser-manifest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: test -d .next
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          if-no-files-found: error

  integration-tests:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next
      - run: npm ci
      - run: python -m pip install --upgrade pip jc==1.25.6
      - run: npm run check:parser-manifest
      - run: |
          npm run start > server.log 2>&1 &
          echo $! > server.pid
        shell: bash
      - run: |
          for attempt in {1..60}; do
            status="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3000/api/health || true)"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          cat server.log
          exit 1
        shell: bash
      - run: node tests/integration.mjs
      - if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
        shell: bash

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t parsedeck:ci .
